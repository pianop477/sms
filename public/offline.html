<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4361ee">
    <title>ShuleApp | Offline Mode</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --danger: #e63946;
            --light-bg: #f8f9fa;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-card {
            background: #ffffff;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 360px;
            padding: 40px 24px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(67, 97, 238, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: var(--primary);
        }

        .icon-container img {
            width: 40px;
            height: 40px;
            fill: #3498db
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .message {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(230, 57, 70, 0.08);
            color: var(--danger);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .retry-btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
        }

        .retry-btn:active {
            background: var(--primary-dark);
        }

        .retry-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spin {
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #f8f9fa;
            }
            .offline-card {
                background: #1e1e1e;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
            h1 { color: #f8f9fa; }
            .message { color: #a0a0a0; }
        }
    </style>
</head>

<body>

    <div class="offline-card">
        <div class="icon-container" id="iconContainer">
            <!-- <i class="fas fa-wifi" id="mainIcon"></i> -->
             <img src="{{ asset('icons/wifi-slash.svg') }}" alt="">
        </div>

        <div class="status-badge" id="statusBadge">
            <i class="fas fa-circle" style="font-size: 8px;"></i> Offline Mode
        </div>

        <h1 id="titleText">No Connection</h1>
        <p class="message" id="messageText">Please, check your device internet connection and try again to use ShuleApp.</p>

        <button class="retry-btn" id="retryBtn">
            <i class="fas fa-rotate-right" id="btnIcon"></i> Retry
        </button>
    </div>

    <script>
        const retryBtn = document.getElementById('retryBtn');
        const btnIcon = document.getElementById('btnIcon');
        const statusBadge = document.getElementById('statusBadge');
        const messageText = document.getElementById('messageText');
        const mainIcon = document.getElementById('mainIcon');

        // Function to attempt reconnection
        function tryReconnect() {
            // Disable button and add loading states
            retryBtn.disabled = true;
            btnIcon.classList.add('spin');
            messageText.textContent = "Inajadili muunganisho wa mtandao...";

            // Check navigator status or perform a quick fetch check
            setTimeout(() => {
                if (navigator.onLine) {
                    // Success redirection
                    statusBadge.style.background = "rgba(76, 201, 240, 0.1)";
                    statusBadge.style.color = "#0096c7";
                    statusBadge.innerHTML = '<i class="fas fa-circle" style="font-size: 8px;"></i> Connected!';
                    messageText.textContent = "Connection restored! Loading files...";

                    const lastUrl = document.referrer || window.location.origin;
                    window.location.href = lastUrl;
                } else {
                    // Fail state resetting smoothly
                    retryBtn.disabled = false;
                    btnIcon.classList.remove('spin');
                    messageText.textContent = "No connection. Please check your mobile data or Wi-fi and try again";
                }
            }, 1200); // Quick natural delay for better UX
        }

        retryBtn.addEventListener('click', tryReconnect);

        // Auto-detect when network comes back automatically
        window.addEventListener('online', () => {
            tryReconnect();
        });
    </script>
</body>

</html>
