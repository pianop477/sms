<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ShuleApp | Offline Mode</title>

    <!-- Single Font Awesome import -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #4361ee;
            --danger: #e63946;
            --success: #4cc9f0;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border-radius: 12px;
            --box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            text-align: center;
            line-height: 1.6;
            padding: 20px;
        }

        .offline-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            max-width: 90%;
            width: 500px;
            transform: translateY(0);
            animation: fadeInUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .offline-icon {
            font-size: 5rem;
            color: var(--danger);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        h1 {
            color: var(--dark);
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        p {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 25px;
        }

        .connection-status {
            display: inline-block;
            padding: 8px 18px;
            background: linear-gradient(135deg, rgba(230, 57, 70, 0.1), rgba(230, 57, 70, 0.05));
            color: var(--danger);
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(230, 57, 70, 0.2);
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--primary), #3a0ca3);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
        }

        .retry-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(67, 97, 238, 0.4);
        }

        .retry-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 2px;
            margin-top: 25px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--primary), var(--success));
            transition: width 0.3s ease;
        }

        .tips {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            padding-top: 20px;
        }

        .tips h3 {
            font-size: 0.9rem;
            color: var(--dark);
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tips ul {
            padding-left: 20px;
            margin: 0;
        }

        .tips li {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .tips li i {
            color: var(--primary);
            margin-right: 8px;
            font-size: 0.75rem;
        }

        .saved-pages {
            margin-top: 20px;
            background: rgba(67, 97, 238, 0.05);
            border-radius: 8px;
            padding: 12px;
            display: none;
        }

        .saved-pages.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .saved-pages h4 {
            font-size: 0.85rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .saved-pages ul {
            list-style: none;
            padding-left: 0;
        }

        .saved-pages li {
            font-size: 0.8rem;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 480px) {
            .offline-container {
                padding: 30px 20px;
                width: 95%;
            }

            h1 {
                font-size: 1.5rem;
            }

            .offline-icon {
                font-size: 3.5rem;
            }

            .retry-btn {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .offline-container {
                background: rgba(33, 37, 41, 0.98);
            }

            h1,
            .tips h3 {
                color: #f8f9fa;
            }

            p,
            .tips li {
                color: #adb5bd;
            }

            .tips {
                border-top-color: rgba(255, 255, 255, 0.1);
            }
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="connection-status" id="connectionStatus">
            <i class="fas fa-circle"
                style="font-size: 0.5rem; vertical-align: middle; margin-right: 6px; color: #e63946;"></i>
            OFFLINE MODE
        </div>
        <i class="fas fa-wifi-slash offline-icon"></i>
        <h1>No Internet Connection</h1>
        <p id="mainMessage">We can't connect to the internet right now. Please check your connection and try again.</p>

        <button class="retry-btn" id="retryBtn">
            <i class="fas fa-sync-alt"></i> Try Again
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="tips">
            <h3><i class="fas fa-lightbulb"></i> Quick Fixes:</h3>
            <ul>
                <li><i class="fas fa-wifi"></i> Check your Wi-Fi or mobile data connection</li>
                <li><i class="fas fa-sync-alt"></i> Toggle Airplane mode on/off</li>
                <li><i class="fas fa-server"></i> Restart your router or modem</li>
                <li><i class="fas fa-shield-alt"></i> Disable any VPN or proxy services</li>
            </ul>
        </div>
    </div>

    <script>
        // Prevent any errors from affecting the page
        window.addEventListener('error', function (e) {
            console.warn('Caught error:', e.message);
            e.preventDefault();
            return true;
        });

        // Safe console log wrapper
        const safeLog = function (msg) {
            if (typeof console !== 'undefined' && console.log) {
                console.log('[Offline Page]', msg);
            }
        };

        safeLog('Offline page loaded');

        // Store last visited URL safely
        try {
            if (!navigator.onLine) {
                const lastUrl = document.referrer || window.location.origin;
                sessionStorage.setItem('offline_lastURL', lastUrl);
                safeLog('Stored last URL: ' + lastUrl);
            }
        } catch (e) {
            safeLog('Could not store last URL: ' + e.message);
        }

        // Function to check and display saved pages
        async function checkSavedPages() {
            const savedPagesDiv = document.getElementById('savedPages');
            const savedPagesList = document.getElementById('savedPagesList');

            if (!savedPagesDiv || !savedPagesList) return;

            try {
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    let savedUrls = [];

                    for (const cacheName of cacheNames) {
                        const cache = await caches.open(cacheName);
                        const requests = await cache.keys();

                        for (const request of requests) {
                            const url = request.url;
                            // Filter only important pages
                            if (url.includes('/dashboard') ||
                                url.includes('/students') ||
                                url.includes('/home') ||
                                url === window.location.origin + '/') {
                                if (!savedUrls.includes(url)) {
                                    savedUrls.push(url);
                                }
                            }
                        }
                    }

                    if (savedUrls.length > 0) {
                        savedPagesList.innerHTML = savedUrls.map(url =>
                            `<li><i class="fas fa-file-alt"></i> ${url.replace(window.location.origin, '') || 'Home'}</li>`
                        ).join('');
                        savedPagesDiv.classList.add('show');
                        safeLog('Found ' + savedUrls.length + ' saved pages');
                    }
                }
            } catch (e) {
                safeLog('Error checking saved pages: ' + e.message);
            }
        }

        // Call after a short delay
        setTimeout(checkSavedPages, 500);

        // ============================================================
        // FIXED: Connection checking with 30 second delay between retries
        // ============================================================
        let retryCount = 0;
        const maxRetries = 5; // Increased max retries
        let isChecking = false;
        let lastCheckTime = 0;
        let autoCheckInterval = null;
        let progressInterval = null;

        // Clear any existing interval
        if (autoCheckInterval) {
            clearInterval(autoCheckInterval);
        }

        function stopProgressAnimation() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        function resetProgressBar() {
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');
            if (progressBar) progressBar.style.width = '0%';
            if (progressContainer) progressContainer.style.display = 'none';
        }

        function checkConnection() {
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const retryBtn = document.getElementById('retryBtn');
            const connectionStatus = document.getElementById('connectionStatus');
            const mainMessage = document.getElementById('mainMessage');

            if (!progressContainer || !retryBtn) return;

            // Prevent multiple simultaneous checks
            if (isChecking) {
                safeLog('Connection check already in progress, skipping...');
                return;
            }

            // Check if enough time has passed since last check (30 seconds minimum)
            const now = Date.now();
            if (lastCheckTime > 0 && (now - lastCheckTime) < 30000) {
                const secondsLeft = Math.ceil((30000 - (now - lastCheckTime)) / 1000);
                safeLog(`Please wait ${secondsLeft} seconds before retrying...`);

                // Update UI to show waiting period
                if (connectionStatus) {
                    connectionStatus.innerHTML = `<i class="fas fa-hourglass-half"></i> WAIT ${secondsLeft}s BEFORE RETRY`;
                }
                if (mainMessage) {
                    mainMessage.innerHTML = `Please wait ${secondsLeft} seconds before trying again...`;
                }
                return;
            }

            isChecking = true;
            retryCount++;
            lastCheckTime = now;

            retryBtn.disabled = true;
            progressContainer.style.display = 'block';

            // Stop any existing progress animation
            stopProgressAnimation();

            // Update status message
            if (connectionStatus) {
                connectionStatus.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CHECKING CONNECTION...';
            }
            if (mainMessage) {
                mainMessage.innerHTML = `Attempt ${retryCount} of ${maxRetries} - Checking connection... Please wait.`;
            }

            // Animate progress bar smoothly over 3 seconds
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += 5;
                if (progressBar) {
                    progressBar.style.width = `${Math.min(progress, 100)}%`;
                }

                if (progress >= 100) {
                    clearInterval(progressInterval);
                    progressInterval = null;

                    // Final connection check after animation
                    setTimeout(() => {
                        if (navigator.onLine) {
                            safeLog('Connection restored! Redirecting...');
                            const lastURL = sessionStorage.getItem('offline_lastURL');
                            const redirectUrl = lastURL || window.location.origin;
                            window.location.href = redirectUrl;
                        } else {
                            // Still offline
                            progressContainer.style.display = 'none';
                            resetProgressBar();
                            retryBtn.disabled = false;
                            isChecking = false;

                            if (connectionStatus) {
                                connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #e63946;"></i> OFFLINE MODE';
                            }

                            if (mainMessage) {
                                if (retryCount >= maxRetries) {
                                    mainMessage.innerHTML = 'Still having trouble connecting. Please check your network settings and try again later.';
                                } else {
                                    const nextRetryIn = 30;
                                    mainMessage.innerHTML = `Unable to connect. Will retry automatically in ${nextRetryIn} seconds. (Attempt ${retryCount}/${maxRetries})`;
                                }
                            }
                            safeLog('Still offline after attempt ' + retryCount);

                            // Schedule next auto retry after 30 seconds
                            if (retryCount < maxRetries) {
                                safeLog(`Next retry scheduled in 30 seconds...`);
                                if (connectionStatus) {
                                    connectionStatus.innerHTML = `<i class="fas fa-clock"></i> NEXT RETRY IN 30s`;
                                }
                            }
                        }
                    }, 500);
                }
            }, 30); // 30ms * 20 = 600ms for 60%, total ~3 seconds
        }

        // New function: Schedule retry with delay
        let scheduledRetry = null;

        function scheduleRetry(delaySeconds = 30) {
            if (scheduledRetry) {
                clearTimeout(scheduledRetry);
            }

            const retryBtn = document.getElementById('retryBtn');
            const connectionStatus = document.getElementById('connectionStatus');
            const mainMessage = document.getElementById('mainMessage');

            let timeLeft = delaySeconds;

            // Update countdown in UI
            const countdownInterval = setInterval(() => {
                if (!navigator.onLine && timeLeft > 0) {
                    if (connectionStatus) {
                        connectionStatus.innerHTML = `<i class="fas fa-clock"></i> RETRY IN ${timeLeft}s`;
                    }
                    if (mainMessage && retryCount < maxRetries) {
                        mainMessage.innerHTML = `No connection. Auto-retry in ${timeLeft} seconds... (Attempt ${retryCount}/${maxRetries})`;
                    }
                    timeLeft--;
                } else {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            scheduledRetry = setTimeout(() => {
                clearInterval(countdownInterval);
                if (!navigator.onLine && retryCount < maxRetries) {
                    safeLog('Executing scheduled retry...');
                    checkConnection();
                }
                scheduledRetry = null;
            }, delaySeconds * 1000);
        }

        // Manual retry button handler (FIXED: respects 30 second cooldown)
        const retryBtn = document.getElementById('retryBtn');
        if (retryBtn) {
            retryBtn.addEventListener('click', function () {
                const now = Date.now();
                if (lastCheckTime > 0 && (now - lastCheckTime) < 30000) {
                    const secondsLeft = Math.ceil((30000 - (now - lastCheckTime)) / 1000);
                    safeLog(`Manual retry blocked: ${secondsLeft}s remaining`);

                    const connectionStatus = document.getElementById('connectionStatus');
                    const mainMessage = document.getElementById('mainMessage');

                    if (connectionStatus) {
                        connectionStatus.innerHTML = `<i class="fas fa-hourglass"></i> WAIT ${secondsLeft}s`;
                        setTimeout(() => {
                            if (connectionStatus && !navigator.onLine) {
                                connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #e63946;"></i> OFFLINE MODE';
                            }
                        }, 2000);
                    }
                    if (mainMessage) {
                        mainMessage.innerHTML = `Please wait ${secondsLeft} seconds before trying again.`;
                        setTimeout(() => {
                            if (mainMessage && !navigator.onLine && retryCount < maxRetries) {
                                mainMessage.innerHTML = `Unable to connect. Auto-retry in progress... (Attempt ${retryCount}/${maxRetries})`;
                            }
                        }, 3000);
                    }
                } else {
                    // Reset retry count if max reached and user manually retries
                    if (retryCount >= maxRetries) {
                        retryCount = 0;
                        safeLog('Retry count reset for manual retry');
                    }
                    checkConnection();
                }
            });
        }

        // ============================================================
        // FIXED: Auto-check every 30 seconds (not 15 seconds)
        // ============================================================
        let redirectScheduled = false;

        setInterval(() => {
            if (navigator.onLine && !redirectScheduled) {
                safeLog('Connection detected, preparing to redirect...');
                redirectScheduled = true;

                // Add small delay to ensure stable connection
                setTimeout(() => {
                    const lastURL = sessionStorage.getItem('offline_lastURL');
                    if (navigator.onLine) {
                        safeLog('Redirecting to: ' + (lastURL || window.location.origin));
                        window.location.href = lastURL || window.location.origin;
                    } else {
                        redirectScheduled = false;
                    }
                }, 2000);
            }

            // Auto retry when offline - after 30 seconds have passed
            if (!navigator.onLine && !isChecking && retryCount < maxRetries) {
                const now = Date.now();
                if (lastCheckTime === 0 || (now - lastCheckTime) >= 30000) {
                    safeLog('Auto retry triggered by interval (30s passed)');
                    checkConnection();
                }
            }
        }, 30000); // Changed from 15000 to 30000 (30 seconds)

        // Listen for online event (FIXED: no immediate redirect, small delay)
        window.addEventListener('online', () => {
            safeLog('Online event fired');
            const connectionStatus = document.getElementById('connectionStatus');
            if (connectionStatus) {
                connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #2ecc71;"></i> CONNECTION RESTORED!';
            }

            // Wait 2 seconds before redirecting to ensure stable connection
            setTimeout(() => {
                if (navigator.onLine) {
                    const lastURL = sessionStorage.getItem('offline_lastURL');
                    safeLog('Redirecting after online event');
                    window.location.href = lastURL || window.location.origin;
                }
            }, 2000);
        });

        // Listen for offline event
        window.addEventListener('offline', () => {
            safeLog('Offline event fired');
            const connectionStatus = document.getElementById('connectionStatus');
            if (connectionStatus) {
                connectionStatus.innerHTML = '<i class="fas fa-circle" style="color: #e63946;"></i> OFFLINE MODE';
            }

            // Reset redirect flag
            redirectScheduled = false;
        });

        // Add keyboard shortcut (press 'r' to retry) - but respect 30s cooldown
        document.addEventListener('keydown', function (e) {
            if (e.key === 'r' || e.key === 'R') {
                const retryBtnElement = document.getElementById('retryBtn');
                if (retryBtnElement && !retryBtnElement.disabled) {
                    e.preventDefault();

                    // Check cooldown
                    const now = Date.now();
                    if (lastCheckTime > 0 && (now - lastCheckTime) < 30000) {
                        const secondsLeft = Math.ceil((30000 - (now - lastCheckTime)) / 1000);
                        safeLog(`Keyboard retry blocked: ${secondsLeft}s remaining`);
                        const mainMessage = document.getElementById('mainMessage');
                        if (mainMessage) {
                            mainMessage.innerHTML = `Please wait ${secondsLeft} seconds before retrying.`;
                            setTimeout(() => {
                                if (mainMessage && !navigator.onLine) {
                                    mainMessage.innerHTML = `Unable to connect. Auto-retry in progress... (Attempt ${retryCount}/${maxRetries})`;
                                }
                            }, 3000);
                        }
                    } else {
                        retryBtnElement.click();
                    }
                }
            }
        });

        // ============================================================
        // FIXED: Initial check - wait 3 seconds before checking
        // ============================================================
        setTimeout(() => {
            if (navigator.onLine) {
                safeLog('Already online, redirecting after delay...');
                const lastURL = sessionStorage.getItem('offline_lastURL');
                setTimeout(() => {
                    if (navigator.onLine) {
                        window.location.href = lastURL || window.location.origin;
                    }
                }, 2000);
            } else {
                safeLog('Initially offline, will retry in 30 seconds');
                // Schedule first retry after 30 seconds
                scheduleRetry(30);
            }
        }, 3000); // Wait 3 seconds before initial check

        // Fix for the error you mentioned - prevent any undefined access
        if (typeof Object.defineProperty === 'function') {
            try {
                window.recentTransactions = window.recentTransactions || [];
                window.dashboardData = window.dashboardData || {};
            } catch (e) {
                safeLog('Error setting globals: ' + e.message);
            }
        }

        // Cleanup function (optional - for SPA navigation)
        window.addEventListener('beforeunload', function () {
            if (scheduledRetry) {
                clearTimeout(scheduledRetry);
            }
            if (progressInterval) {
                clearInterval(progressInterval);
            }
            stopProgressAnimation();
        });
    </script>
</body>

</html>
